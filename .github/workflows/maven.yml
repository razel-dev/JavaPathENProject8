name: Java CI with Maven

on:
  push:
    branches: [ "master" ]   # Déclenche sur push vers master
  pull_request:
    branches: [ "master" ]   # Déclenche sur PR visant master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    defaults:
      run:
        working-directory: ./TourGuide
    steps:
      # Récupération du code
      - uses: actions/checkout@v4
      
      # Installation de Java 17 + activation du cache Maven (~/.m2) pour accélérer
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install internal libs to local Maven repo
        if: ${{ hashFiles('libs/*.jar', 'TourGuide/libs/*.jar') != '' }}
        run: |
          ROOT_LIB="$GITHUB_WORKSPACE/libs"
          TG_LIB="$GITHUB_WORKSPACE/TourGuide/libs"

          [ -f "$ROOT_LIB/gpsUtil.jar" ] && mvn -B -ntp install:install-file -Dfile="$ROOT_LIB/gpsUtil.jar" -DgroupId=gpsUtil -DartifactId=gpsUtil -Dversion=1.0.0 -Dpackaging=jar || true
          [ -f "$ROOT_LIB/RewardCentral.jar" ] && mvn -B -ntp install:install-file -Dfile="$ROOT_LIB/RewardCentral.jar" -DgroupId=rewardCentral -DartifactId=rewardCentral -Dversion=1.0.0 -Dpackaging=jar || true
          [ -f "$ROOT_LIB/TripPricer.jar" ] && mvn -B -ntp install:install-file -Dfile="$ROOT_LIB/TripPricer.jar" -DgroupId=tripPricer -DartifactId=tripPricer -Dversion=1.0.0 -Dpackaging=jar || true

          [ -f "$TG_LIB/gpsUtil.jar" ] && mvn -B -ntp install:install-file -Dfile="$TG_LIB/gpsUtil.jar" -DgroupId=gpsUtil -DartifactId=gpsUtil -Dversion=1.0.0 -Dpackaging=jar || true
          [ -f "$TG_LIB/RewardCentral.jar" ] && mvn -B -ntp install:install-file -Dfile="$TG_LIB/RewardCentral.jar" -DgroupId=rewardCentral -DartifactId=rewardCentral -Dversion=1.0.0 -Dpackaging=jar || true
          [ -f "$TG_LIB/TripPricer.jar" ] && mvn -B -ntp install:install-file -Dfile="$TG_LIB/TripPricer.jar" -DgroupId=tripPricer -DartifactId=tripPricer -Dversion=1.0.0 -Dpackaging=jar || true
      # 1) Compilation (sans exécuter les tests) — KISS
      - name: Compile
        run: mvn -B -ntp -DskipTests=true clean compile
     
      # 2) Tests (unitaires/intégration)
      - name: Test
        run: mvn -B -ntp test
    
      # 3) Build des artefacts (JAR) sans relancer les tests
      - name: Package
        run: mvn -B -ntp -DskipTests=true package
     
      # Téléverse le(s) JAR produit(s) dans target/ comme artefacts du run
      # permet le déploiement sans recompiler
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: "**/target/*.jar"
     
      # rapports de tests pour diagnostic
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5
        continue-on-error: true
        with:
          directory: ./TourGuide
          maven-args: "-ntp -DskipTests"
          fail-on-error: false

